services:
  dashboard:
    build: .
    command: python dashboard.py
    environment:
      EQUITY: ${EQUITY:-10000}
      SLOTS: ${SLOTS:-10}
      FEE_BPS: ${FEE_BPS:-10}
      BREAKOUT_BUFFER_PCT: ${BREAKOUT_BUFFER_PCT:-0.2}
    ports:
      - "5050:5050"
    volumes:
      - .:/app
  scanner:
    build: .
    command: python scanner.py
    environment:
      MIN_CHANGE: ${MIN_CHANGE:-5}
      MAX_CHANGE: ${MAX_CHANGE:-30}
      MIN_DELIVERY_DAYS: ${MIN_DELIVERY_DAYS:-7}
      SCAN_VOLUME_KLINE: ${SCAN_VOLUME_KLINE:-1m}
      SCAN_VOLUME_MINUTES: ${SCAN_VOLUME_MINUTES:-15}
      SCAN_SECONDS: ${SCAN_SECONDS:-10}
    volumes:
      - .:/app
  strategy:
    build: .
    command: python strategy.py --watch --equity ${EQUITY:-10000} --slots ${SLOTS:-10} --margin-pct ${MARGIN_PCT:-5} --fee-bps ${FEE_BPS:-10}
    environment:
      LEVEL_KLINE: ${LEVEL_KLINE:-15m}
      VOLUME_KLINE: ${VOLUME_KLINE:-1m}
      MIN_QVOL: ${MIN_QVOL:-50000}
      VOL_MULT: ${VOL_MULT:-2}
      SPIKE_MINUTES: ${SPIKE_MINUTES:-3}
      BREAKOUT_BUFFER_PCT: ${BREAKOUT_BUFFER_PCT:-0.2}
      SETUP_ONLY: ${SETUP_ONLY:-1}
      STRATEGY_SECONDS: ${STRATEGY_SECONDS:-1}
      SLOTS: ${SLOTS:-10}
      MARGIN_PCT: ${MARGIN_PCT:-5}
      LEVERAGE: ${LEVERAGE:-2}
      MAX_LEVERAGE: ${MAX_LEVERAGE:-2}
      TRADE_MODE: ${TRADE_MODE:-paper}
      LIVE_TRADING_CONFIRM: ${LIVE_TRADING_CONFIRM:-}
      MAX_LIVE_NOTIONAL: ${MAX_LIVE_NOTIONAL:-}
      LIVE_SYMBOLS: ${LIVE_SYMBOLS:-}
      BINANCE_FUTURES_API_BASE: ${BINANCE_FUTURES_API_BASE:-https://fapi.binance.com}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
    volumes:
      - .:/app
  watcher:
    build: .
    command: python watcher.py
    environment:
      LEVEL_KLINE: ${LEVEL_KLINE:-15m}
      VOLUME_KLINE: ${VOLUME_KLINE:-1m}
      SETUP_ONLY: ${SETUP_ONLY:-1}
      MIN_QVOL: ${MIN_QVOL:-50000}
      VOL_MULT: ${VOL_MULT:-2}
      SPIKE_MINUTES: ${SPIKE_MINUTES:-3}
      BREAKOUT_BUFFER_PCT: ${BREAKOUT_BUFFER_PCT:-0.2}
      WATCH_SECONDS: ${WATCH_SECONDS:-5}
      POSITION_TIMEOUT_SECONDS: ${POSITION_TIMEOUT_SECONDS:-3600}
      TRADE_MODE: ${TRADE_MODE:-paper}
      LIVE_TRADING_CONFIRM: ${LIVE_TRADING_CONFIRM:-}
      MAX_LIVE_NOTIONAL: ${MAX_LIVE_NOTIONAL:-}
      LIVE_SYMBOLS: ${LIVE_SYMBOLS:-}
      BINANCE_FUTURES_API_BASE: ${BINANCE_FUTURES_API_BASE:-https://fapi.binance.com}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
    volumes:
      - .:/app
